<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Envelope body -->
  <rect x="4" y="16" width="56" height="38" rx="4" fill="#228be6"/>
  <!-- Envelope flap (open, folded back) -->
  <path d="M4 20 L32 40 L60 20" fill="none" stroke="#1971c2" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner lighter area -->
  <rect x="8" y="22" width="48" height="28" rx="2" fill="#e7f5ff"/>
  <!-- Ticket stub lines -->
  <line x1="16" y1="32" x2="40" y2="32" stroke="#228be6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="36" y2="38" stroke="#74c0fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="43" x2="30" y2="43" stroke="#a5d8ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Envelope top flap -->
  <path d="M4 20 C4 17 6 16 8 16 L32 34 L56 16 C58 16 60 17 60 20 L32 42 Z" fill="#339af0"/>
  <!-- Notification badge -->
  <circle cx="52" cy="16" r="10" fill="#fa5252"/>
  <text x="52" y="20.5" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="13" fill="white">#</text>
</svg>